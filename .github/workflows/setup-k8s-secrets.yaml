name: Setup K8s Secrets

on:
  workflow_dispatch:  # Manuell trigger
  push:
    paths:
      - 'time-learning-app/k8s/**'
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/time-learning-app

jobs:
  setup-secrets:
    runs-on: self-hosted  # Kräver self-hosted runner på din Mac
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      run: |
        # Kontrollera att kubectl är tillgängligt
        kubectl version --client

    - name: Create/Update Image Pull Secret
      run: |
        # Ta bort gammal secret om den finns
        kubectl delete secret ghcr-secret -n time-learning --ignore-not-found=true
        
        # Skapa ny secret med GitHub token
        kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --docker-email=${{ github.actor }}@users.noreply.github.com \
          -n time-learning
        
        echo "Secret created successfully!"

    - name: Verify Secret
      run: |
        kubectl get secret ghcr-secret -n time-learning
        echo "Secret verified!"

    - name: Restart Deployment
      run: |
        kubectl rollout restart deployment/time-learning-app -n time-learning
        kubectl rollout status deployment/time-learning-app -n time-learning --timeout=120s
