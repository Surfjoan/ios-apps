name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'time-learning-app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/time-learning-app

jobs:
  # Build and test
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install frontend dependencies
      working-directory: ./time-learning-app/frontend
      run: npm install

    - name: Build frontend
      working-directory: ./time-learning-app/frontend
      run: npm run build

    - name: Install backend dependencies
      working-directory: ./time-learning-app/backend
      run: npm install

    - name: Build backend
      working-directory: ./time-learning-app/backend
      run: npm run build

    - name: Run tests
      working-directory: ./time-learning-app/backend
      run: npm test || true

  # Build and push Docker image
  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./time-learning-app
        file: ./time-learning-app/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        no-cache: true

  # Note: ArgoCD handles deployment automatically
  # It will detect the new image and sync the application
