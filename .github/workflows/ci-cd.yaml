name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'time-learning-app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/time-learning-app

jobs:
  # Build and test
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install frontend dependencies
      working-directory: ./time-learning-app/frontend
      run: npm install

    - name: Build frontend
      working-directory: ./time-learning-app/frontend
      run: npm run build

    - name: Install backend dependencies
      working-directory: ./time-learning-app/backend
      run: npm install

    - name: Build backend
      working-directory: ./time-learning-app/backend
      run: npm run build

    - name: Run tests
      working-directory: ./time-learning-app/backend
      run: npm test || true

  # Build and push Docker image
  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./time-learning-app
        file: ./time-learning-app/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Kubernetes (only on main branch)
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml

    - name: Update image tag in deployment
      run: |
        sed -i "s|image: ghcr.io/.*|image: ghcr.io/${{ github.repository_owner }}/time-learning-app:sha-${{ github.sha }}|g" time-learning-app/k8s/deployment.yaml

    - name: Deploy to Kubernetes
      run: |
        export KUBECONFIG=kubeconfig.yaml
        kubectl apply -f time-learning-app/k8s/deployment.yaml
        kubectl rollout status deployment/time-learning-app -n time-learning --timeout=300s

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig.yaml
        kubectl get pods -n time-learning
        kubectl get svc -n time-learning
        kubectl get ingress -n time-learning
