apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-learning-app
  labels:
    app: time-learning-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: time-learning-app
  template:
    metadata:
      labels:
        app: time-learning-app
    spec:
      containers:
      - name: time-learning-app
        image: ghcr.io/surfjoan/time-learning-app:latest
        ports:
        - containerPort: 3001
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: time-learning-app
spec:
  selector:
    app: time-learning-app
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: time-learning-app
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - klockan.surfjoan.dev
    secretName: time-learning-app-tls
  rules:
  - host: klockan.surfjoan.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: time-learning-app
            port:
              number: 80
